name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run Ruff (design-agent scope)
        run: uv run --locked ruff check api/routes/design_agent.py agent/design_agent_service.py tests/unit/test_design_agent_route.py
      - name: Run Black (design-agent scope)
        run: uv run --locked black --check api/routes/design_agent.py agent/design_agent_service.py tests/unit/test_design_agent_route.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Expose for step if: — secrets.* cannot be used directly in if expressions.
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run full blocking test suite with coverage
        env:
          ANTHROPIC_API_KEY: sk-ant-test-ci-placeholder
        run: uv run --locked python -m pytest tests/ -v --cov=agent --cov=api --cov=core --cov=cli --cov-report=term-missing --cov-report=xml:coverage.xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
      # Optional: only when CODECOV_TOKEN is configured (job env, not secrets-in-if).
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Verify generated Python 3.11 lock
        run: uv lock --check
      - name: Audit locked runtime dependencies
        run: uv run --locked --all-extras pip-audit --strict -r requirements.lock
      - name: Install Bandit
        run: uv sync --locked --all-extras
      - name: Run Bandit (app paths, high severity)
        # Scope excludes .venv (uv sync) and known medium FPs (B108/B104). High = gate.
        run: uv run --locked bandit -r agent api core cli main.py -lll

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required only when this repository belongs to a GitHub organization.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run mypy (design-agent scope)
        run: uv run --locked mypy api/routes/design_agent.py agent/design_agent_service.py --ignore-missing-imports --follow-imports=skip --disable-error-code=untyped-decorator