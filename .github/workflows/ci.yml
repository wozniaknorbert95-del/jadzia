name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      - name: Run Ruff (design-agent scope)
        run: |
          ruff check api/routes/design_agent.py agent/design_agent_service.py tests/unit/test_design_agent_route.py
      - name: Run Black (design-agent scope)
        run: |
          black --check api/routes/design_agent.py agent/design_agent_service.py tests/unit/test_design_agent_route.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pillow
      - name: Run tests with coverage (design-agent gate)
        run: python -m pytest tests/unit/test_design_agent_route.py tests/test_worker_scenarios_ci.py -v --cov=api.routes.design_agent --cov=agent.design_agent_service --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -x ./venv,./tests -ll

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy>=1.0.0
          pip install -r requirements.txt
      - name: Run mypy (design-agent scope)
        run: mypy api/routes/design_agent.py agent/design_agent_service.py --ignore-missing-imports